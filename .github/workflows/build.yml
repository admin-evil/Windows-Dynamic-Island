name: Build & Release
on:
  push:
    tags: ["v*"]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install pyinstaller PyQt5 psutil winsdk
      - run: pyinstaller --noconfirm --onefile --windowed --name DynamicIsland main.py
      - uses: softprops/action-gh-release@v1
        with: {files: dist/DynamicIsland.exe}
        env: {GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"}
